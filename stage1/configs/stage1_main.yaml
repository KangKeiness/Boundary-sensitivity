models:
  recipient: "Qwen/Qwen2.5-1.5B-Instruct"
  donor: "Qwen/Qwen2.5-1.5B"

boundary_grid: [4, 8, 12, 16]
t_fixed: 20

reference:
  b_ref: 8
  t_ref: 20

hidden_state:
  pooling: "last_token"  # "last_token" or "mean"

random_donor:
  mode: "same_width_random_source"
  seed: 42

dataset:
  name: "mgsm"
  lang: "zh"
  split: "test"
  debug_n: null  # set integer for debug subset

generation:
  do_sample: false
  temperature: 0.0
  max_new_tokens: 256

evaluation:
  bootstrap_n: 1000
  bootstrap_ci: 0.95
  criteria_threshold: 2  # out of 3 conditions
